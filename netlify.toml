[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm run build:netlify"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"

[[redirects]]
  from = "/api/*"
  to = "https://api.secretlayer.net/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
