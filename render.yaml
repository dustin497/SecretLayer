services:
  - type: web
    name: family-testing-services
    runtime: node
    plan: free
    region: ohio
    repo: https://github.com/dustin497/SecretLayer
    branch: render-deploy
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
